<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团队 HTML Demo 项目管理台</title>
  <style>
    :root {
      --bg: #f4f5f2;
      --bg-soft: #eef3f6;
      --ink: #1f2328;
      --muted: #6c737c;
      --line: rgba(38, 45, 55, 0.12);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --accent: #5967d8;
      --accent-dark: #3740a7;
      --folder: #d9e4ef;
      --folder-tab: #c6d7e8;
      --warm: #ece3d5;
      --shadow: 0 24px 70px rgba(32, 42, 54, 0.12);
      --shadow-soft: 0 16px 40px rgba(32, 42, 54, 0.09);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(199, 214, 226, 0.7), transparent 34vw),
        linear-gradient(135deg, var(--bg), var(--bg-soft) 50%, #f6f1ea);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1440px, calc(100% - 40px));
      min-height: calc(100vh - 40px);
      margin: 20px auto;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.42);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr minmax(260px, 420px) auto;
      align-items: center;
      gap: 16px;
      padding: 8px 8px 8px 14px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3.4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 760;
    }

    .search {
      position: relative;
      height: 52px;
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 30px rgba(31, 35, 40, 0.06);
      overflow: hidden;
    }

    .search::before {
      content: "";
      width: 18px;
      height: 18px;
      margin-left: 20px;
      border: 2px solid #77808b;
      border-radius: 50%;
    }

    .search::after {
      content: "";
      position: absolute;
      left: 35px;
      top: 31px;
      width: 9px;
      height: 2px;
      border-radius: 99px;
      background: #77808b;
      transform: rotate(45deg);
    }

    .search input {
      width: 100%;
      min-width: 0;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      padding: 0 18px 0 13px;
      font-size: 15px;
    }

    .search input::placeholder {
      color: #8a929b;
    }

    .upload-button {
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #222936, var(--accent));
      box-shadow: 0 16px 34px rgba(67, 76, 180, 0.24);
      white-space: nowrap;
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease);
    }

    .upload-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 42px rgba(67, 76, 180, 0.3);
    }

    .upload-button .plus {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background:
        linear-gradient(#fff, #fff) center / 10px 2px no-repeat,
        linear-gradient(#fff, #fff) center / 2px 10px no-repeat,
        rgba(255, 255, 255, 0.16);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
    }

    .side,
    .main {
      min-height: 0;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
    }

    .side {
      padding: 18px;
      overflow: auto;
    }

    .main {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .upload-zone {
      position: relative;
      min-height: 174px;
      border: 1px dashed rgba(47, 57, 70, 0.22);
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.38)),
        radial-gradient(circle at 20% 20%, rgba(89, 103, 216, 0.12), transparent 50%);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      transition: transform 240ms var(--ease), border-color 240ms var(--ease), background 240ms var(--ease);
    }

    .upload-zone.is-dragging {
      transform: translateY(-2px);
      border-color: rgba(89, 103, 216, 0.55);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(244, 247, 255, 0.72)),
        radial-gradient(circle at 20% 20%, rgba(89, 103, 216, 0.18), transparent 50%);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background:
        linear-gradient(var(--accent), var(--accent)) center 14px / 2px 18px no-repeat,
        linear-gradient(135deg, #ffffff, #dee8f2);
      box-shadow: inset 0 0 0 1px rgba(47, 57, 70, 0.08), 0 16px 32px rgba(47, 57, 70, 0.12);
      position: relative;
    }

    .upload-icon::before,
    .upload-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 15px;
      width: 10px;
      height: 2px;
      border-radius: 99px;
      background: var(--accent);
      transform-origin: left center;
    }

    .upload-icon::before {
      transform: rotate(45deg) translateX(-1px);
    }

    .upload-icon::after {
      transform: rotate(135deg) translateX(-9px);
    }

    .upload-zone h2,
    .section-title h2,
    .content-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .upload-zone p,
    .section-title p,
    .empty-state p,
    .folder-count,
    .meta,
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .ghost-button {
      width: fit-content;
      min-height: 42px;
      border: 1px solid rgba(47, 57, 70, 0.14);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.7);
      padding: 0 16px;
      box-shadow: 0 10px 24px rgba(47, 57, 70, 0.08);
      transition: transform 220ms var(--ease), background 220ms var(--ease);
    }

    .ghost-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.94);
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 2px 14px;
    }

    .folder-list {
      display: grid;
      gap: 14px;
    }

    .folder {
      position: relative;
      display: grid;
      gap: 0;
      border: 0;
      background: transparent;
      padding: 0;
      text-align: left;
      color: inherit;
      isolation: isolate;
    }

    .folder-top {
      position: relative;
      z-index: 1;
      width: 48%;
      height: 22px;
      margin-left: 18px;
      border-radius: 12px 16px 0 0;
      background: var(--folder-tab);
      box-shadow: 0 -2px 8px rgba(31, 35, 40, 0.03);
      transform-origin: 18px 100%;
      transition: transform 440ms var(--ease), filter 440ms var(--ease);
    }

    .folder-body {
      position: relative;
      min-height: 96px;
      margin-top: -1px;
      padding: 22px 20px 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.18)),
        var(--folder);
      box-shadow: 0 18px 35px rgba(55, 73, 92, 0.1);
      overflow: hidden;
      transform-origin: center top;
      transition: transform 440ms var(--ease), box-shadow 440ms var(--ease), background 440ms var(--ease);
    }

    .folder-body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.38), transparent 52%);
      pointer-events: none;
    }

    .folder-name {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
    }

    .folder-arrow {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background:
        linear-gradient(45deg, transparent 47%, #59636f 48% 58%, transparent 59%) center 8px / 9px 9px no-repeat,
        rgba(255, 255, 255, 0.45);
      transform: rotate(90deg);
      transition: transform 360ms var(--ease), background 360ms var(--ease);
      flex: 0 0 auto;
    }

    .folder-count {
      position: relative;
      z-index: 1;
      margin-top: 10px;
    }

    .folder.active .folder-top {
      transform: rotateX(34deg) translateY(-7px);
      filter: brightness(1.02);
    }

    .folder.active .folder-body {
      transform: scaleY(1.035);
      box-shadow: 0 24px 48px rgba(65, 79, 110, 0.16);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.54), rgba(255, 255, 255, 0.2)),
        #dce7ef;
    }

    .folder.active .folder-arrow {
      transform: rotate(180deg);
      background:
        linear-gradient(45deg, transparent 47%, #ffffff 48% 58%, transparent 59%) center 8px / 9px 9px no-repeat,
        var(--accent);
    }

    .content-head {
      flex: 0 0 auto;
      padding: 26px 30px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid rgba(47, 57, 70, 0.08);
    }

    .content-title {
      min-width: 0;
    }

    .content-title h2 {
      font-size: 24px;
    }

    .content-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 24px 30px 30px;
    }

    .folder-projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      animation: revealProjects 420ms var(--ease) both;
    }

    @keyframes revealProjects {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .project-card {
      min-height: 255px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.54));
      box-shadow: 0 18px 40px rgba(32, 42, 54, 0.09);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .project-preview {
      height: 112px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(34, 41, 54, 0.08), rgba(89, 103, 216, 0.1)),
        linear-gradient(#fff, #eef2f5);
      border: 1px solid rgba(47, 57, 70, 0.08);
      position: relative;
      overflow: hidden;
    }

    .project-preview::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 15px;
      width: 70px;
      height: 10px;
      border-radius: 99px;
      background: rgba(31, 35, 40, 0.13);
      box-shadow: 0 24px 0 rgba(31, 35, 40, 0.08), 0 48px 0 rgba(89, 103, 216, 0.1);
    }

    .project-preview::after {
      content: "";
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 82px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 0 0 1px rgba(47, 57, 70, 0.08);
    }

    .project-info {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .project-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      word-break: break-word;
    }

    .project-category {
      width: fit-content;
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(89, 103, 216, 0.1);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-grid {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-grid span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: auto;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(32, 42, 54, 0.07);
      color: #4f5963;
      font-size: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary,
    .danger {
      min-height: 42px;
      border-radius: 14px;
      transition: transform 200ms var(--ease), background 200ms var(--ease);
    }

    .primary {
      color: #fff;
      background: #222936;
    }

    .primary:hover,
    .danger:hover {
      transform: translateY(-1px);
    }

    .danger {
      color: #8e3341;
      background: #f7e4e7;
    }

    .empty-state {
      min-height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 38px 16px;
    }

    .empty-inner {
      width: min(430px, 100%);
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .empty-icon {
      width: 92px;
      height: 72px;
      position: relative;
      margin-bottom: 6px;
    }

    .empty-icon::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 0;
      width: 39px;
      height: 18px;
      border-radius: 12px 14px 0 0;
      background: #cbd8e5;
    }

    .empty-icon::after {
      content: "";
      position: absolute;
      inset: 14px 0 0;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.18)),
        #dde7ef;
      box-shadow: 0 18px 34px rgba(55, 73, 92, 0.11);
    }

    .empty-state h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .notice {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 20;
      max-width: min(520px, calc(100% - 36px));
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 18px;
      background: rgba(31, 35, 40, 0.88);
      color: #fff;
      box-shadow: 0 18px 40px rgba(31, 35, 40, 0.22);
      opacity: 0;
      transform: translate(-50%, 16px);
      pointer-events: none;
      transition: opacity 260ms var(--ease), transform 260ms var(--ease);
    }

    .notice.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .preview-panel {
      position: fixed;
      inset: 20px 20px 20px auto;
      z-index: 15;
      width: min(760px, calc(100vw - 40px));
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 32px;
      background: rgba(247, 248, 247, 0.92);
      box-shadow: 0 28px 90px rgba(22, 27, 36, 0.26);
      backdrop-filter: blur(24px);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      transform: translateX(calc(100% + 34px));
      transition: transform 520ms var(--ease);
    }

    .preview-panel.open {
      transform: translateX(0);
    }

    .preview-head {
      min-width: 0;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      border-bottom: 1px solid rgba(47, 57, 70, 0.1);
    }

    .preview-title {
      min-width: 0;
    }

    .preview-title p {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-title h2 {
      margin: 0;
      font-size: 22px;
      overflow-wrap: anywhere;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .preview-button {
      min-height: 40px;
      border-radius: 999px;
      padding: 0 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(47, 57, 70, 0.1);
    }

    .close-button {
      min-width: 62px;
      height: 40px;
      border-radius: 999px;
      color: #313842;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(47, 57, 70, 0.1);
    }

    .preview-body {
      min-height: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .preview-label {
      color: var(--muted);
      font-size: 14px;
    }

    .preview-frame-wrap {
      min-height: 0;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(47, 57, 70, 0.1);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: block;
    }

    .scrim {
      position: fixed;
      inset: 0;
      z-index: 14;
      background: rgba(18, 22, 30, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 320ms var(--ease);
    }

    .scrim.show {
      opacity: 1;
      pointer-events: auto;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .shell {
        width: min(100% - 24px, 760px);
        min-height: calc(100vh - 24px);
        margin: 12px auto;
        padding: 14px;
        border-radius: 28px;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 4px;
      }

      .workspace {
        min-height: auto;
      }

      .side,
      .main {
        border-radius: 26px;
      }

      .folder-list,
      .folder-projects {
        grid-template-columns: 1fr;
      }

      .content-head {
        align-items: flex-start;
        flex-direction: column;
        padding: 22px 20px 14px;
      }

      .content-body {
        padding: 18px 20px 22px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: 100%;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
      }

      h1 {
        font-size: 31px;
      }

      .upload-zone {
        min-height: 158px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        inset: 0;
        width: 100vw;
        border-radius: 0;
      }

      .preview-head {
        grid-template-columns: 1fr;
      }

      .preview-actions {
        justify-content: space-between;
      }

      .preview-button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">团队 HTML Demo 管理台</p>
        <h1>项目管理页面</h1>
      </div>

      <label class="search" for="searchInput">
        <input id="searchInput" type="search" placeholder="搜索项目名称或文件名" autocomplete="off">
      </label>

      <button class="upload-button" id="topUploadButton" type="button">
        <span class="plus" aria-hidden="true"></span>
        <span>上传项目</span>
      </button>
    </header>

    <main class="workspace">
      <aside class="side">
        <section class="upload-zone" id="uploadZone">
          <div class="upload-icon" aria-hidden="true"></div>
          <div>
            <h2>上传 HTML Demo</h2>
            <p>拖拽文件到这里上传；通过共享服务打开时，上传后团队成员都可以查看。</p>
            <p class="hint">可识别 ZIP 文件；当前共享版暂不自动解压，请上传其中的 HTML 文件。</p>
          </div>
          <button class="ghost-button" id="zoneUploadButton" type="button">选择文件</button>
          <input class="visually-hidden" id="fileInput" type="file" accept=".html,.htm,.zip,text/html,application/zip" multiple>
        </section>

        <div class="section-title">
          <div>
            <h2>分类文件夹</h2>
            <p id="folderSummary">等待上传项目</p>
          </div>
        </div>
        <div class="folder-list" id="folderList"></div>
      </aside>

      <section class="main">
        <div class="content-head">
          <div class="content-title">
            <h2 id="contentTitle">暂无项目</h2>
            <p class="meta" id="contentMeta">请上传团队 HTML Demo 文件，系统会自动整理分类并共享</p>
          </div>
          <button class="ghost-button" id="contentUploadButton" type="button">上传项目</button>
        </div>
        <div class="content-body" id="contentBody"></div>
      </section>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="preview-panel" id="previewPanel" aria-hidden="true">
    <div class="preview-head">
      <div class="preview-title">
        <p>项目标题</p>
        <h2 id="previewTitle">未选择项目</h2>
      </div>
      <div class="preview-actions">
        <button class="preview-button" id="openWindowButton" type="button">新窗口打开</button>
        <button class="close-button" id="closePreviewButton" type="button">关闭</button>
      </div>
    </div>
    <div class="preview-body">
      <div class="preview-label">预览区域</div>
      <div class="preview-frame-wrap">
        <iframe id="previewFrame" title="项目预览" sandbox="allow-scripts allow-forms allow-popups allow-modals"></iframe>
      </div>
    </div>
  </aside>

  <div class="notice" id="notice" role="status" aria-live="polite"></div>

  <script>
    const projects = [];

    const categoryRules = [
      {
        name: "AI 视觉",
        keywords: ["ai", "aigc", "visual", "image", "图像", "视觉"]
      },
      {
        name: "动效实验",
        keywords: ["motion", "animation", "animate", "动效", "动画"]
      },
      {
        name: "音乐可视化",
        keywords: ["audio", "music", "sound", "音乐", "音频", "可视化"]
      },
      {
        name: "地图交互",
        keywords: ["map", "地图", "car", "路线", "路径"]
      },
      {
        name: "界面设计",
        keywords: ["ui", "interface", "app", "页面", "界面"]
      },
      {
        name: "品牌活动",
        keywords: ["brand", "logo", "kv", "campaign", "品牌", "活动"]
      }
    ];

    const fallbackCategory = "未分类";
    const folderColors = {
      "AI 视觉": ["#dce7f3", "#cad9ea"],
      "动效实验": ["#e6e1ef", "#d6cfe7"],
      "音乐可视化": ["#e8e4d8", "#dbd3c1"],
      "地图交互": ["#dce9e3", "#caddd5"],
      "界面设计": ["#dfe5eb", "#ced8e1"],
      "品牌活动": ["#eee3dd", "#e0d0c7"],
      "未分类": ["#e2e4e5", "#d2d5d8"]
    };

    const fileInput = document.getElementById("fileInput");
    const topUploadButton = document.getElementById("topUploadButton");
    const zoneUploadButton = document.getElementById("zoneUploadButton");
    const contentUploadButton = document.getElementById("contentUploadButton");
    const uploadZone = document.getElementById("uploadZone");
    const searchInput = document.getElementById("searchInput");
    const folderList = document.getElementById("folderList");
    const folderSummary = document.getElementById("folderSummary");
    const contentTitle = document.getElementById("contentTitle");
    const contentMeta = document.getElementById("contentMeta");
    const contentBody = document.getElementById("contentBody");
    const previewPanel = document.getElementById("previewPanel");
    const previewTitle = document.getElementById("previewTitle");
    const previewFrame = document.getElementById("previewFrame");
    const openWindowButton = document.getElementById("openWindowButton");
    const closePreviewButton = document.getElementById("closePreviewButton");
    const scrim = document.getElementById("scrim");
    const notice = document.getElementById("notice");

    let activeCategory = "";
    let activePreviewProjectId = "";
    let noticeTimer = 0;
    const isSharedServerMode = window.location.protocol === "http:" || window.location.protocol === "https:";

    function createProjectId() {
      return "project-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getBaseName(fileName) {
      return fileName.replace(/\.[^/.]+$/, "");
    }

    function getExtension(fileName) {
      const parts = fileName.toLowerCase().split(".");
      return parts.length > 1 ? parts.pop() : "";
    }

    function classifyFile(fileName) {
      const lowerName = fileName.toLowerCase();
      const matchedRule = categoryRules.find((rule) => {
        return rule.keywords.some((keyword) => lowerName.includes(keyword.toLowerCase()));
      });
      return matchedRule ? matchedRule.name : fallbackCategory;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) {
        return bytes + " 字节";
      }
      if (bytes < 1024 * 1024) {
        return (bytes / 1024).toFixed(1) + " KB";
      }
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function formatTime(date) {
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showNotice(message) {
      window.clearTimeout(noticeTimer);
      notice.textContent = message;
      notice.classList.add("show");
      noticeTimer = window.setTimeout(() => {
        notice.classList.remove("show");
      }, 3200);
    }

    function syncProjects(nextProjects) {
      projects.splice(0, projects.length, ...nextProjects);
    }

    function getEmptyDescription() {
      if (isSharedServerMode) {
        return "请上传团队 HTML Demo 文件，系统会自动整理分类并共享";
      }
      return "当前是本地临时预览模式；团队共享请先运行 node server.js，再打开 http://localhost:4173";
    }

    async function loadProjects() {
      if (!isSharedServerMode) {
        showNotice("当前通过本地文件打开，只能临时预览；团队共享请使用 http://localhost:4173");
        render();
        return;
      }

      try {
        const response = await fetch("/api/projects");
        if (!response.ok) {
          throw new Error("项目列表加载失败");
        }
        const data = await response.json();
        syncProjects(data.projects || []);
      } catch (error) {
        showNotice("请通过团队共享服务地址打开页面，例如 http://localhost:4173");
      }
      render();
    }

    async function uploadFilesToServer(files) {
      const formData = new FormData();
      files.forEach((file) => {
        formData.append("files", file);
      });

      const response = await fetch("/api/projects", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error("上传失败");
      }

      return response.json();
    }

    function createLocalProjects(files) {
      const localProjects = files.map((file) => {
        const objectUrl = URL.createObjectURL(file);
        return {
          id: createProjectId(),
          name: getBaseName(file.name),
          fileName: file.name,
          category: classifyFile(file.name),
          tags: ["HTML", "本地临时", "可预览"],
          uploadTime: formatTime(new Date()),
          fileSize: formatFileSize(file.size),
          previewUrl: objectUrl,
          objectUrl
        };
      });

      projects.push(...localProjects);
      return localProjects;
    }

    function getFilteredProjects() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) {
        return projects.slice();
      }
      return projects.filter((project) => {
        return (
          project.name.toLowerCase().includes(keyword) ||
          project.fileName.toLowerCase().includes(keyword) ||
          project.category.toLowerCase().includes(keyword)
        );
      });
    }

    function groupByCategory(projectList) {
      return projectList.reduce((groups, project) => {
        if (!groups[project.category]) {
          groups[project.category] = [];
        }
        groups[project.category].push(project);
        return groups;
      }, {});
    }

    function setActiveCategoryFromGroups(groups) {
      const categories = Object.keys(groups);
      if (!categories.length) {
        activeCategory = "";
        return;
      }
      if (!activeCategory || !groups[activeCategory]) {
        activeCategory = categories[0];
      }
    }

    function renderEmptyState(title, description) {
      contentBody.innerHTML = "";
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.innerHTML = `
        <div class="empty-inner">
          <div class="empty-icon" aria-hidden="true"></div>
          <h2>${title}</h2>
          <p>${description}</p>
        </div>
      `;
      contentBody.appendChild(empty);
    }

    function renderFolders(groups) {
      folderList.innerHTML = "";
      const categories = Object.keys(groups);
      folderSummary.textContent = categories.length ? categories.length + " 个分类" : "等待上传项目";

      categories.forEach((category) => {
        const colors = folderColors[category] || folderColors[fallbackCategory];
        const folder = document.createElement("button");
        folder.type = "button";
        folder.className = "folder" + (category === activeCategory ? " active" : "");
        folder.style.setProperty("--folder", colors[0]);
        folder.style.setProperty("--folder-tab", colors[1]);
        folder.setAttribute("aria-expanded", category === activeCategory ? "true" : "false");
        folder.innerHTML = `
          <div class="folder-top"></div>
          <div class="folder-body">
            <div class="folder-name">
              <span>${escapeHtml(category)}</span>
              <span class="folder-arrow" aria-hidden="true"></span>
            </div>
            <p class="folder-count">${groups[category].length} 个项目</p>
          </div>
        `;
        folder.addEventListener("click", () => {
          activeCategory = category;
          render();
        });
        folderList.appendChild(folder);
      });
    }

    function renderProjectCards(items) {
      contentBody.innerHTML = "";
      const wrap = document.createElement("div");
      wrap.className = "folder-projects";

      items.forEach((project) => {
        const card = document.createElement("article");
        card.className = "project-card";
        card.innerHTML = `
          <div class="project-preview" aria-hidden="true"></div>
          <div class="project-info">
            <h3 class="project-title">${escapeHtml(project.name)}</h3>
            <div class="project-category">${escapeHtml(project.category)}</div>
            <div class="detail-grid">
              <span>文件名：${escapeHtml(project.fileName)}</span>
              <span>上传时间：${escapeHtml(project.uploadTime)}</span>
              <span>文件大小：${escapeHtml(project.fileSize)}</span>
            </div>
          </div>
          <div class="tags">${project.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          <div class="actions">
            <button class="primary" type="button" data-action="preview" data-id="${project.id}">预览项目</button>
            <button class="danger" type="button" data-action="remove" data-id="${project.id}">移除项目</button>
          </div>
        `;
        wrap.appendChild(card);
      });

      contentBody.appendChild(wrap);
    }

    function render() {
      const filtered = getFilteredProjects();
      const groups = groupByCategory(filtered);
      setActiveCategoryFromGroups(groups);
      renderFolders(groups);

      if (!projects.length) {
        contentTitle.textContent = "暂无项目";
        contentMeta.textContent = getEmptyDescription();
        renderEmptyState("暂无项目", getEmptyDescription());
        return;
      }

      if (!filtered.length) {
        contentTitle.textContent = "没有找到相关项目";
        contentMeta.textContent = "请调整搜索关键词后再试";
        renderEmptyState("没有找到相关项目", "请调整搜索关键词后再试");
        return;
      }

      const activeItems = groups[activeCategory] || [];
      contentTitle.textContent = activeCategory;
      contentMeta.textContent = activeItems.length + " 个项目已整理到此分类";
      renderProjectCards(activeItems);
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList);
      let zipCount = 0;
      let ignoredCount = 0;
      const htmlFiles = [];

      files.forEach((file) => {
        const extension = getExtension(file.name);

        if (extension === "zip") {
          zipCount += 1;
          return;
        }

        if (extension !== "html" && extension !== "htm" && file.type !== "text/html") {
          ignoredCount += 1;
          return;
        }

        htmlFiles.push(file);
      });

      if (!htmlFiles.length) {
        if (zipCount > 0) {
          showNotice("已识别 ZIP 文件；当前共享版暂不自动解压，请上传其中的 HTML 文件");
        } else if (ignoredCount > 0) {
          showNotice("未找到可上传的 HTML 文件");
        }
        fileInput.value = "";
        render();
        return;
      }

      try {
        if (isSharedServerMode) {
          const data = await uploadFilesToServer(htmlFiles);
          syncProjects(data.projects || []);

          if (data.uploaded && data.uploaded.length) {
            activeCategory = data.uploaded[data.uploaded.length - 1].category;
            showNotice("已上传 " + data.uploaded.length + " 个项目，团队成员现在可以查看");
          }

          if (zipCount > 0 || data.zipCount > 0) {
            showNotice("已上传 HTML 项目；ZIP 文件已识别但暂不自动解压");
          }
        } else {
          const localProjects = createLocalProjects(htmlFiles);
          activeCategory = localProjects[localProjects.length - 1].category;
          showNotice("已临时上传 " + localProjects.length + " 个项目；团队共享请通过 http://localhost:4173 打开");
        }
      } catch (error) {
        showNotice("上传失败：请先运行 node server.js，并通过 http://localhost:4173 打开页面");
      }

      if (ignoredCount > 0 && !htmlFiles.length) {
        showNotice("未找到可上传的 HTML 文件");
      }

      fileInput.value = "";
      render();
    }

    function openPreview(projectId) {
      const project = projects.find((item) => item.id === projectId);
      if (!project) {
        return;
      }
      activePreviewProjectId = project.id;
      previewTitle.textContent = project.name;
      previewFrame.src = project.previewUrl;
      previewPanel.classList.add("open");
      previewPanel.setAttribute("aria-hidden", "false");
      scrim.classList.add("show");
    }

    function closePreview() {
      previewPanel.classList.remove("open");
      previewPanel.setAttribute("aria-hidden", "true");
      scrim.classList.remove("show");
      window.setTimeout(() => {
        if (!previewPanel.classList.contains("open")) {
          previewFrame.src = "about:blank";
          previewTitle.textContent = "未选择项目";
          activePreviewProjectId = "";
        }
      }, 520);
    }

    async function removeProject(projectId) {
      const index = projects.findIndex((item) => item.id === projectId);
      if (index === -1) {
        return;
      }

      const project = projects[index];
      const confirmText = isSharedServerMode
        ? "确定要从团队共享项目库中移除「" + project.name + "」吗？"
        : "确定要移除本地临时项目「" + project.name + "」吗？";
      const confirmed = window.confirm(confirmText);
      if (!confirmed) {
        return;
      }

      if (isSharedServerMode) {
        try {
          const response = await fetch("/api/projects/" + encodeURIComponent(projectId), {
            method: "DELETE"
          });

          if (!response.ok) {
            throw new Error("移除失败");
          }

          const data = await response.json();
          syncProjects(data.projects || []);
        } catch (error) {
          showNotice("移除失败，请确认团队共享服务正在运行");
          return;
        }
      } else {
        if (project.objectUrl) {
          URL.revokeObjectURL(project.objectUrl);
        }
        projects.splice(index, 1);
      }

      if (activePreviewProjectId === projectId) {
        closePreview();
      }

      const stillHasActiveCategory = projects.some((item) => item.category === activeCategory);
      if (!stillHasActiveCategory) {
        activeCategory = "";
      }

      showNotice("已移除项目");
      render();
    }

    function openFilePicker() {
      fileInput.click();
    }

    topUploadButton.addEventListener("click", openFilePicker);
    zoneUploadButton.addEventListener("click", openFilePicker);
    contentUploadButton.addEventListener("click", openFilePicker);

    fileInput.addEventListener("change", (event) => {
      handleFiles(event.target.files);
    });

    searchInput.addEventListener("input", () => {
      render();
    });

    uploadZone.addEventListener("dragover", (event) => {
      event.preventDefault();
      uploadZone.classList.add("is-dragging");
    });

    uploadZone.addEventListener("dragleave", (event) => {
      if (!uploadZone.contains(event.relatedTarget)) {
        uploadZone.classList.remove("is-dragging");
      }
    });

    uploadZone.addEventListener("drop", (event) => {
      event.preventDefault();
      uploadZone.classList.remove("is-dragging");
      handleFiles(event.dataTransfer.files);
    });

    document.addEventListener("dragover", (event) => {
      event.preventDefault();
    });

    document.addEventListener("drop", (event) => {
      event.preventDefault();
      if (!uploadZone.contains(event.target)) {
        handleFiles(event.dataTransfer.files);
      }
    });

    contentBody.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const action = button.dataset.action;
      const projectId = button.dataset.id;

      if (action === "preview") {
        openPreview(projectId);
      }

      if (action === "remove") {
        removeProject(projectId);
      }
    });

    closePreviewButton.addEventListener("click", closePreview);
    scrim.addEventListener("click", closePreview);

    openWindowButton.addEventListener("click", () => {
      const project = projects.find((item) => item.id === activePreviewProjectId);
      if (project) {
        window.open(project.previewUrl, "_blank", "noopener");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewPanel.classList.contains("open")) {
        closePreview();
      }
    });

    window.addEventListener("beforeunload", () => {
      projects.forEach((project) => {
        if (project.objectUrl) {
          URL.revokeObjectURL(project.objectUrl);
        }
      });
    });

    loadProjects();
  loadProjects();

async function organizeProject() {
  const fileName = document.getElementById("fileName").value;
  const projectContent = document.getElementById("projectContent").value;
  const resultBox = document.getElementById("result");

  if (!fileName.trim() && !projectContent.trim()) {
    resultBox.textContent = "请先输入文件名或项目内容。";
    return;
  }

  resultBox.textContent = "AI 整理中...";

  try {
    const response = await fetch("/api/organize-project", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fileName: fileName,
        projectContent: projectContent
      })
    });

    const data = await response.json();

    resultBox.textContent = JSON.stringify(data, null, 2);
  } catch (error) {
    resultBox.textContent = "请求失败，请检查 server.js 是否正常运行。";
  }
}
</script>
<section style="margin: 40px auto; max-width: 800px; padding: 24px; border: 1px solid #ddd; border-radius: 16px;">
  <h2>AI 项目整理测试</h2>

  <input
    id="fileName"
    placeholder="请输入文件名，比如 car-map-demo.html"
    style="width: 100%; padding: 12px; margin-bottom: 12px; box-sizing: border-box;"
  />

  <textarea
    id="projectContent"
    placeholder="请输入项目内容，比如：一个基于真实地图的小车路径动效页面，支持起点到终点路径展示，小车沿路线运动，整体是车载 HMI 风格。"
    style="width: 100%; height: 140px; padding: 12px; box-sizing: border-box;"
  ></textarea>

  <button
    onclick="organizeProject()"
    style="margin-top: 12px; padding: 10px 20px; cursor: pointer;"
  >
    AI 整理项目
  </button>

  <pre
    id="result"
    style="margin-top: 20px; padding: 16px; background: #f6f6f6; border-radius: 12px; white-space: pre-wrap;"
  >结果会显示在这里</pre>
</section>
</body>
</html>
